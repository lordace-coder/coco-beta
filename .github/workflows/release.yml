name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: cocobase-linux-amd64

          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: cocobase-linux-arm64

          - runner: macos-latest
            goos: darwin
            goarch: amd64
            asset_name: cocobase-macos-amd64

          - runner: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: cocobase-macos-arm64

          - runner: windows-latest
            goos: windows
            goarch: amd64
            asset_name: cocobase-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build dashboard
        shell: bash
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Build binary (Unix)
        if: matrix.goos != 'windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o dist/${{ matrix.asset_name }} \
            ./cmd/cocobase
          ls -lh dist/

      - name: Build binary (Windows)
        if: matrix.goos == 'windows'
        shell: cmd
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir dist
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o dist\${{ matrix.asset_name }} .\cmd\cocobase
          dir dist\

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
